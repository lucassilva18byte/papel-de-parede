<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dark Fantasy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

  <!-- FUNDO (campo + castelo) -->
  <img src="assets/background.jpg" class="background">

  <!-- PERSONAGEM -->
  <div class="character">

      <!-- CAPA (atrás) -->
      <video class="cape" autoplay loop muted playsinline>
        <source src="assets/cape.webm" type="video/webm">
      </video>

      <!-- CORPO -->
      <img src="assets/body.png" class="body">

      <!-- CABEÇA (na frente) -->
      <video class="head" autoplay loop muted playsinline>
        <source src="assets/head.webm" type="video/webm">
      </video>

  </div>

</div>

</body>
</html>
